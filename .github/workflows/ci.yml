name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json `packageManager` field (pnpm@11.5.0)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm test
      - name: Lint (web, non-blocking)
        # react-hooks backlog is tracked separately; report violations without failing CI.
        run: pnpm --filter web lint
        continue-on-error: true
      - name: Lint (mobile, non-blocking)
        run: pnpm --filter mobile lint
        continue-on-error: true

  web-e2e:
    runs-on: ubuntu-latest
    needs: lint-test-typecheck
    if: github.event_name == 'pull_request'
    # Runs Playwright against an EPHEMERAL local Supabase spun up in the runner —
    # never production. The prod-guard in playwright.config.ts hard-fails if
    # NEXT_PUBLIC_SUPABASE_URL ever resolves to the prod project ref; e2e specs
    # write and delete data, and pointing them at prod already polluted it once.
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # Local Supabase stack (Postgres 17 per config.toml). `supabase start`
      # applies every migration in packages/db/supabase/migrations on a fresh
      # volume, so CI also validates that migrations apply cleanly.
      - uses: supabase/setup-cli@v1
        with:
          version: 2.102.0

      - name: Start local Supabase (applies migrations)
        working-directory: packages/db
        run: supabase start

      # Map the CLI's env names to what the app + seed scripts expect. These are
      # the well-known local-dev keys the CLI generates on every machine — not
      # secrets. Exporting to $GITHUB_ENV makes them available to later steps
      # (seed scripts) and to the dev server Playwright's webServer boots.
      - name: Export local Supabase env
        working-directory: packages/db
        run: |
          eval "$(supabase status -o env)"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
            echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          } >> "$GITHUB_ENV"

      # Seed the pilot fixture the specs assume: wilson@datum.local + projects
      # BDG-H1 / PKW-PC1012 + areas (seed), then the board cards incl. the
      # "Master bathroom" card the add-event/comment specs open (seed:cards).
      - name: Seed pilot data
        run: |
          pnpm --filter @datum/db seed
          pnpm --filter @datum/db seed:cards

      - run: pnpm --filter web exec playwright install --with-deps chromium

      # ANTHROPIC_API_KEY intentionally unset: the one LLM spec (chat-query)
      # self-skips without it; the rest don't exercise the model.
      - run: pnpm --filter web test:e2e
