name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from package.json `packageManager` field (pnpm@11.5.0)
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck
      - run: pnpm test
      - name: Lint (web, non-blocking)
        # react-hooks backlog is tracked separately; report violations without failing CI.
        run: pnpm --filter web lint
        continue-on-error: true
      - name: Lint (mobile, non-blocking)
        run: pnpm --filter mobile lint
        continue-on-error: true

  web-e2e:
    runs-on: ubuntu-latest
    needs: lint-test-typecheck
    if: github.event_name == 'pull_request'
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter web exec playwright install --with-deps chromium

      - run: pnpm --filter web test:e2e
